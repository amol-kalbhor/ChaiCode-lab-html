<!-- Create a simple table with 3 rows and 3 columns. Learn the basic structure of <table>, <tr>, and <td> tags.

 -->

 <!DOCTYPE html>
<html>
  <head>
    <title>Basic Tables</title>
  </head>
  <body>
    <h1>My First Table</h1>
    <table>

     <tr>
       <td>amol</td>
       <td>amol</td>
       <td>amol</td>
     </tr>

     <tr>
      <td>cofee</td>
      <td>cofee</td>
      <td>cofee</td>
     </tr>

     <tr>
      <td>milk</td>
      <td>milk</td>
      <td>milk</td>
    </tr>
    
    </table>

  </body>
</html>

<!-- Create a table with a header row using <thead> and <th> tags, followed by data rows in <tbody>. The table should show ChaiCode course information.

 -->


 <!DOCTYPE html>
<html>
  <head>
    <title>Table Headers</title>
  </head>
  <body>
    <h1>ChaiCode Courses</h1>
    <!-- Create a table with headers -->
    <table>
      <thead>
        <th>course</th>
        <th>Fees</th>
        <th>technology</th>
      </thead>
      <tbody>
        <td>webdev</td>
        <td>799</td>
        <td>it</td>
      </tbody>
      <tbody>
        <td>online</td>
        <td>online</td>
        <td>empty</td>
      </tbody>
    </table>      
  </body>
</html>
