<!-- Create a responsive image using the <picture> element with multiple <source> tags for different screen sizes, and a fallback <img> tag.-->

<!DOCTYPE html>
<html>
  <head>
    <title>Responsive Images</title>
  </head>
  <body>
    <h1>Adaptive Gallery</h1>
    <picture>
      <source media="min-width:1024px" srcset="large-deskstop.jpg">
      <source media="min-width:720px" srcset="mediam-tablet.jpg">
    <img src="this is my image.jpg" alt="my image">
    </picture>
  </body>
</html>
